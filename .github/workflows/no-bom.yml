name: no-bom
on: [push, pull_request]
jobs:
  check-bom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject UTF-8 BOM in .json/.md
        shell: bash
        run: |
          bom=0
          while IFS= read -r f; do
            if [ "$(head -c3 "$f" | od -An -tx1 | tr -d ' ')" = "efbbbf" ]; then
              echo "::error file=$f::UTF-8 BOM detectado en $f"
              bom=1
            fi
          done < <(git ls-files '*.json' '*.md')
          if [ "$bom" -ne 0 ]; then
            exit 1
          fi
          echo "OK: ningun .json/.md contiene BOM"
